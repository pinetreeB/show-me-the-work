name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: python -m pip install pytest
      - name: Unit tests
        run: python -m pytest tests/ -q
      - name: Deterministic probes
        run: python eval/run_probes.py --strict
      - name: E2E smoke (hook chain)
        run: python eval/e2e_smoke.py
